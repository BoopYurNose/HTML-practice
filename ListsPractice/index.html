<!DOCTYPE html>
<html>
    <header>
        <title>This is for practicing lists in html</title>
    </header>

    <body>
        <!-- Unordered List -->
         <h4>Grocery list</h4>
        <ul>
            <li>Milk</li>
            <li>Rice</li>
            <li>Chicken</li>
            <ul>
                <li>Get the good kind I guess</li>
            </ul>
        </ul>
        
        <!-- Ordered List -->
         <h4>My todo list</h4>
         <ol>
            <li>Wake up 5am</li>
            <li>meditate everyday</li>
         </ol>

        <!-- Description List -->
         <dl style = "background-color: lightgreen; border:2px solid">
            <dt>Disipline</dt>
            <dd>Doing the hard work even when you don't feel like it</dd>

         </dl>
        
    </body>
</html>
